version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: lab4_nginx
    depends_on:
      - php
    links:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  php:
    image: php:8.2-fpm
    container_name: lab4_php
    volumes:
      - ./www:/var/www/html
      - ./vendor:/var/www/vendor
    expose:
      - "9000"